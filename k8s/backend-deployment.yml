apiVersion: apps/v1
kind: Deployment
metadata:
  name: teamflow-backend
  labels:
    app: teamflow
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teamflow
      component: backend
  template:
    metadata:
      labels:
        app: teamflow
        component: backend
    spec:
      containers:
        - name: backend
          image: teamflow-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: teamflow-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: teamflow-secrets
                  key: JWT_SECRET
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
