apiVersion: apps/v1
kind: Deployment
metadata:
  name: teamflow-frontend
  labels:
    app: teamflow
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teamflow
      component: frontend
  template:
    metadata:
      labels:
        app: teamflow
        component: frontend
    spec:
      containers:
        - name: frontend
          image: teamflow-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "300m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
