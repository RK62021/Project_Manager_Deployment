version: '3.8'

services:
  # Express REST API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamflow-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - NODE_ENV=production
    networks:
      - teamflow-network

  # Compiled React SPA (served via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: teamflow-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - teamflow-network

networks:
  teamflow-network:
    driver: bridge

# ==========================================
# OPTIONAL LOCAL OFFLINE MONGO DEVELOPMENT
# ==========================================
# If you ever want to run a local offline database:
# 1. Uncomment the mongodb service below
# 2. Add 'mongodb' to depends_on in backend
# 3. Change MONGO_URI in .env to: mongodb://mongodb:27017/projectmanager
#
#   mongodb:
#     image: mongo:latest
#     container_name: teamflow-mongodb
#     ports:
#       - "27017:27017"
#     volumes:
#       - mongo-data:/data/db
#     networks:
#       - teamflow-network
#
# volumes:
#   mongo-data:
#     driver: local
